<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width, initial-scale=1.0">
    <title>layouting1</title>
    <style>
        .menu{
            width: 100%;
            height: 30px;
            background-color: orangered;
            color: #fff;
            padding-left: 30px;
        }
        .header{
            width: 100%;
            height: 100px;
            background-color: rgb(92, 13, 13);
            color: white;
            padding-left: 30px;
        }
        .konten{
            width: 100%;
            height: 150px;
            background-color: blue;
            color: #fff;
            padding-left: 30px;
        }
        .footer{
            width: 100%;
            height: 200px;
            background-color: goldenrod;
            color: #fff;
            padding-left: 30px;
        }
    </style>
</head>
<body>
    <div class="menu">MENU</div>
    <div class="header">HEADER</div>
    <div class="konten">KONTEN</div>
    <div class="footer">FOOTER</div>
</body>
</html>
